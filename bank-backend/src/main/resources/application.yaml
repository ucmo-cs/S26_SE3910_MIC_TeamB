spring:
  application:
    name: bank-backend

  datasource:
    url: jdbc:h2:mem:bankdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  mail:
    from: ${MAIL_USERNAME}

jwt:
  # Base64-encoded signing key for local/dev only.
  secret: dGhpc0lzQVNlY3VyZUJhc2U2NEVuY29kZWRLZXlGb3JKV1RBdXRo
  expiration: 86400000
